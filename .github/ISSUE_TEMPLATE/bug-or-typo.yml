name: Bug or typo
description: Report a broken link, typo, formatting problem, or site bug.
title: "Bug or typo: "
labels: ["bug", "documentation"]
body:
  - type: input
    id: page
    attributes:
      label: Page
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: Issue
    validations:
      required: true
  - type: textarea
    id: suggested-fix
    attributes:
      label: Suggested fix
